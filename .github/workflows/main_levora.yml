name: Build and deploy Node.js app to Azure Web App - Levora

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Install backend dependencies
      - name: Install Backend Dependencies
        run: npm ci

      # Build React frontend
      - name: Install Frontend Dependencies
        working-directory: ./client
        run: npm ci

      - name: Build React App
        working-directory: ./client
        run: npm run build

      # Upload project for deployment
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D02DD11246B844C28CB7797EDC1DA8DC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_13E69C7A97044481AD683BE98D83DA41 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E2414E6F86A141A0948BCAB0A6E6F829 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: Levora
          slot-name: Production
          package: .